# Nginx reverse-proxy for Chinitsu Showdown
# Place at: /etc/nginx/sites-available/chinitsu
# Enable: ln -s /etc/nginx/sites-available/chinitsu /etc/nginx/sites-enabled/
# Test:   nginx -t
# Reload: systemctl reload nginx

server {
    listen 80;
    server_name _;   # match any hostname / bare IP

    # WebSocket + HTTP proxy to FastAPI container
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # WebSocket upgrade headers (required for /ws/* endpoints)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep WebSocket connections alive during a full game (up to 2 h)
        proxy_read_timeout  7200s;
        proxy_send_timeout  7200s;

        # Prevent nginx from buffering streaming responses
        proxy_buffering off;
    }
}
