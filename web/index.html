<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chinitsu Showdown</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Connection Screen -->
  <div id="lobby" class="screen">
    <div class="lobby-box">
      <h1>清一色 Showdown</h1>
      <p class="subtitle">2-Player Chinitsu Mahjong</p>
      <div class="form-group">
        <label for="input-player">Player Name</label>
        <input type="text" id="input-player" placeholder="Enter your name" maxlength="20" />
      </div>
      <div class="form-group">
        <label for="input-room">Room Name</label>
        <input type="text" id="input-room" placeholder="Enter room name" maxlength="20" />
      </div>
      <button id="btn-connect" class="btn btn-primary">Join Room</button>
      <div id="lobby-status" class="status-msg"></div>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game" class="screen" style="display:none;">
    <!-- Top bar: opponent info -->
    <div id="opponent-bar" class="player-bar opponent-bar">
      <span class="player-name" id="opp-name">Opponent</span>
      <span class="player-points" id="opp-points">150,000</span>
      <span class="badge" id="opp-oya-badge" style="display:none;">親</span>
      <span class="badge badge-riichi" id="opp-riichi-badge" style="display:none;">立直</span>
    </div>

    <!-- Opponent hand (face down) -->
    <div id="opp-hand" class="hand-row opp-hand-row"></div>

    <!-- Opponent fuuro (melds) -->
    <div id="opp-fuuro" class="fuuro-row"></div>

    <!-- Opponent discards -->
    <div class="kawa-section">
      <div id="opp-kawa" class="kawa"></div>
    </div>

    <!-- Center info -->
    <div id="center-info">
      <div class="center-left">
        <span id="wall-count">Wall: 36</span>
        <span id="kyoutaku-info"></span>
      </div>
      <div class="center-mid">
        <span id="turn-indicator"></span>
      </div>
      <div class="center-right">
        <span id="round-result"></span>
      </div>
    </div>

    <!-- My discards -->
    <div class="kawa-section">
      <div id="my-kawa" class="kawa"></div>
    </div>

    <!-- My fuuro (melds) -->
    <div id="my-fuuro" class="fuuro-row"></div>

    <!-- My hand -->
    <div id="my-hand" class="hand-row my-hand-row"></div>

    <!-- Bottom bar: my info + actions -->
    <div id="my-bar" class="player-bar my-bar">
      <div class="my-info">
        <span class="player-name" id="my-name">Me</span>
        <span class="player-points" id="my-points">150,000</span>
        <span class="badge" id="my-oya-badge" style="display:none;">親</span>
        <span class="badge badge-riichi" id="my-riichi-badge" style="display:none;">立直</span>
      </div>
      <div id="action-buttons" class="action-buttons">
        <button class="btn btn-action" id="btn-start">Start Game</button>
        <button class="btn btn-action" id="btn-draw" style="display:none;">Draw</button>
        <button class="btn btn-action btn-riichi" id="btn-riichi" style="display:none;">Riichi</button>
        <button class="btn btn-action btn-tsumo" id="btn-tsumo" style="display:none;">Tsumo</button>
        <button class="btn btn-action btn-ron" id="btn-ron" style="display:none;">Ron</button>
        <button class="btn btn-action" id="btn-skip" style="display:none;">Skip</button>
        <button class="btn btn-action btn-kan" id="btn-kan" style="display:none;">Kan</button>
      </div>
    </div>

    <!-- Message log (collapsible) -->
    <div id="message-log">
      <div id="log-toggle" class="log-toggle">Log ▲</div>
      <div id="log-content" class="log-content"></div>
    </div>

    <!-- Agari overlay -->
    <div id="agari-overlay" class="overlay" style="display:none;">
      <div class="overlay-box">
        <h2 id="agari-title"></h2>
        <div id="agari-details"></div>
        <button class="btn btn-primary" id="btn-new-game">New Game</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
