version: '3.9'

services:
  app:
    image: ccr.ccs.tencentyun.com/chinitsu/chinitsu-demo:latest
    container_name: chinitsu-demo
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      REDIS_URL: redis://8.155.149.12:26379/0     # ← 明确使用你已有的外部 Redis
      SECRET_KEY: ${SECRET_KEY:-chinitsu-showdown-secret-key-change-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      DATA_DIR: /data
    volumes:
      - chinitsu_data:/data

volumes:
  chinitsu_data: